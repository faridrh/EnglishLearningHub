<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Words Match</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto max-w-3xl px-4 py-8">
      <a href="/games/" class="inline-flex items-center rounded-lg bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-200 hover:bg-slate-700">← Back to Games</a>

      <section class="mt-6 rounded-2xl border border-slate-700 bg-slate-900 p-6 shadow-xl">
        <h1 class="text-3xl font-extrabold">📘 IELTS Words Match</h1>
        <p class="mt-2 text-slate-300">Choose the correct description for the given IELTS-level word.</p>

        <div class="mt-6 grid gap-4 sm:grid-cols-3">
          <div class="rounded-xl bg-slate-800 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-400">Score</p>
            <p id="scoreEl" class="mt-1 text-2xl font-bold text-emerald-400">0</p>
          </div>
          <div class="rounded-xl bg-slate-800 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-400">Question</p>
            <p id="progressEl" class="mt-1 text-2xl font-bold text-sky-400">1 / 10</p>
          </div>
          <div class="rounded-xl bg-slate-800 p-4">
            <p class="text-xs uppercase tracking-wide text-slate-400">Best Streak</p>
            <p id="streakEl" class="mt-1 text-2xl font-bold text-amber-400">0</p>
          </div>
        </div>

        <div class="mt-6 rounded-xl border border-slate-700 bg-slate-800 p-5">
          <p class="text-sm text-slate-400">Word</p>
          <p id="wordEl" class="mt-1 text-4xl font-extrabold text-white">-</p>
        </div>

        <div id="optionsEl" class="mt-5 grid gap-3"></div>

        <p id="feedbackEl" class="mt-4 min-h-6 text-sm font-semibold"></p>

        <div class="mt-5 flex flex-wrap gap-3">
          <button id="nextBtn" class="rounded-lg bg-emerald-500 px-5 py-2.5 font-bold text-slate-950 hover:bg-emerald-400 disabled:cursor-not-allowed disabled:opacity-50" disabled>Next</button>
          <button id="restartBtn" class="rounded-lg bg-slate-700 px-5 py-2.5 font-bold text-slate-100 hover:bg-slate-600">Restart</button>
        </div>
      </section>
    </main>

    <script>
      const BANK = [
        { word: 'meticulous', description: 'very careful and precise, with great attention to detail' },
        { word: 'deteriorate', description: 'to become progressively worse in quality or condition' },
        { word: 'substantial', description: 'large in amount, value, or importance' },
        { word: 'advocate', description: 'to publicly support or recommend a particular cause' },
        { word: 'coherent', description: 'logical, clear, and consistent in structure or argument' },
        { word: 'alleviate', description: 'to make pain, difficulty, or a problem less severe' },
        { word: 'prevalent', description: 'common and widespread in a particular area or group' },
        { word: 'constrain', description: 'to limit or restrict someone or something' },
        { word: 'feasible', description: 'possible and practical to do successfully' },
        { word: 'ambiguous', description: 'open to more than one interpretation; unclear' },
        { word: 'comprehensive', description: 'complete and including all or nearly all elements' },
        { word: 'infer', description: 'to draw a conclusion based on evidence and reasoning' },
        { word: 'consecutive', description: 'following one after another without interruption' },
        { word: 'disparity', description: 'a great difference, especially an unfair one' },
        { word: 'relevant', description: 'closely connected to the subject currently being discussed' }
      ];

      const totalQuestions = 10;
      const scoreEl = document.getElementById('scoreEl');
      const progressEl = document.getElementById('progressEl');
      const streakEl = document.getElementById('streakEl');
      const wordEl = document.getElementById('wordEl');
      const optionsEl = document.getElementById('optionsEl');
      const feedbackEl = document.getElementById('feedbackEl');
      const nextBtn = document.getElementById('nextBtn');
      const restartBtn = document.getElementById('restartBtn');

      let quiz = [];
      let index = 0;
      let score = 0;
      let streak = 0;
      let answered = false;

      function shuffle(list) {
        const arr = [...list];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function setupQuiz() {
        quiz = shuffle(BANK).slice(0, totalQuestions);
        index = 0;
        score = 0;
        streak = 0;
        answered = false;
        nextBtn.disabled = true;
        feedbackEl.textContent = '';
        render();
      }

      function buildOptions(correctItem) {
        const wrong = shuffle(BANK.filter((item) => item.word !== correctItem.word))
          .slice(0, 3)
          .map((item) => item.description);
        return shuffle([correctItem.description, ...wrong]);
      }

      function selectAnswer(selectedDescription) {
        if (answered || index >= totalQuestions) return;

        answered = true;
        nextBtn.disabled = false;
        const item = quiz[index];
        const isCorrect = selectedDescription === item.description;

        if (isCorrect) {
          score += 1;
          streak += 1;
          feedbackEl.textContent = '✅ Correct!';
          feedbackEl.className = 'mt-4 min-h-6 text-sm font-semibold text-emerald-400';
        } else {
          streak = 0;
          feedbackEl.textContent = `❌ Not quite. Correct: ${item.description}`;
          feedbackEl.className = 'mt-4 min-h-6 text-sm font-semibold text-rose-400';
        }

        renderStats();
        renderOptions(item, selectedDescription);
      }

      function renderStats() {
        scoreEl.textContent = String(score);
        progressEl.textContent = `${Math.min(index + 1, totalQuestions)} / ${totalQuestions}`;
        streakEl.textContent = String(streak);
      }

      function renderOptions(item, selectedDescription = null) {
        optionsEl.innerHTML = '';
        const options = buildOptions(item);
        options.forEach((description) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'rounded-xl border border-slate-600 bg-slate-800 p-4 text-left text-sm text-slate-100 hover:border-sky-400 hover:bg-slate-700';
          button.textContent = description;
          button.disabled = answered;

          if (answered) {
            if (description === item.description) {
              button.className = 'rounded-xl border border-emerald-500 bg-emerald-950 p-4 text-left text-sm text-emerald-200';
            } else if (description === selectedDescription) {
              button.className = 'rounded-xl border border-rose-500 bg-rose-950 p-4 text-left text-sm text-rose-200';
            } else {
              button.className = 'rounded-xl border border-slate-700 bg-slate-800 p-4 text-left text-sm text-slate-400';
            }
          } else {
            button.addEventListener('click', () => selectAnswer(description));
          }

          optionsEl.appendChild(button);
        });
      }

      function renderCompletion() {
        wordEl.textContent = 'Finished!';
        optionsEl.innerHTML = '';
        const result = document.createElement('div');
        result.className = 'rounded-xl border border-slate-700 bg-slate-800 p-5 text-slate-200';
        result.textContent = `You scored ${score} out of ${totalQuestions}.`;
        optionsEl.appendChild(result);
        feedbackEl.textContent = score >= 8 ? '🌟 Excellent IELTS vocabulary work!' : '💪 Nice effort—play again to improve!';
        feedbackEl.className = 'mt-4 min-h-6 text-sm font-semibold text-sky-300';
        progressEl.textContent = `${totalQuestions} / ${totalQuestions}`;
        nextBtn.disabled = true;
      }

      function render() {
        renderStats();
        if (index >= totalQuestions) {
          renderCompletion();
          return;
        }

        const item = quiz[index];
        wordEl.textContent = item.word;
        answered = false;
        nextBtn.disabled = true;
        feedbackEl.textContent = '';
        feedbackEl.className = 'mt-4 min-h-6 text-sm font-semibold';
        renderOptions(item);
      }

      nextBtn.addEventListener('click', () => {
        if (index >= totalQuestions || !answered) return;
        index += 1;
        render();
      });

      restartBtn.addEventListener('click', setupQuiz);

      setupQuiz();
    </script>
  </body>
</html>
