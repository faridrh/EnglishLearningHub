
<!doctype html>
<html lang="az" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anagram Səyahəti</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    * { font-family: 'Outfit', sans-serif; }

    .mono { font-family: 'JetBrains Mono', monospace; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.7); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
      50% { box-shadow: 0 0 20px 4px rgba(251, 191, 36, 0.2); }
    }
    @keyframes correctBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.2); }
      50% { transform: scale(0.95); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(60px) rotate(720deg); opacity: 0; }
    }
    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
    .scale-in { animation: scaleIn 0.35s ease-out forwards; }
    .shake { animation: shake 0.4s ease-in-out; }
    .pop-in { animation: popIn 0.3s ease-out forwards; }
    .correct-bounce { animation: correctBounce 0.5s ease-out; }
    .timer-pulse { animation: timerPulse 0.5s ease-in-out infinite; }

    .letter-tile {
      transition: all 0.15s ease;
      cursor: pointer;
      user-select: none;
    }
    .letter-tile:hover:not(.used) {
      transform: translateY(-4px) scale(1.05);
    }
    .letter-tile.used {
      opacity: 0.25;
      transform: scale(0.9);
      cursor: default;
    }

    .answer-slot {
      transition: all 0.2s ease;
    }
    .answer-slot.filled {
      animation: popIn 0.25s ease-out;
    }
    .answer-slot.hint-revealed {
      animation: pulse-glow 1.5s ease-in-out 2;
    }

    .progress-ring {
      transition: stroke-dashoffset 1s linear;
    }

    .level-card {
      transition: all 0.25s ease;
    }
    .level-card:hover {
      transform: translateY(-6px);
    }

    .toast-msg {
      animation: fadeInUp 0.3s ease-out;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti-fall 1.2s ease-out forwards;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app-wrapper" class="w-full h-full" style="background: #0f172a;"><!-- SCREEN: Level Select -->
   <main id="screen-select" class="w-full h-full flex flex-col items-center justify-center p-6" role="main">
    <div class="text-center fade-in-up max-w-2xl w-full">
     <div class="mb-2"><span class="text-5xl">🔤</span>
     </div>
     <h1 id="titleEl" class="text-4xl md:text-5xl font-900 tracking-tight mb-2" style="color: #f8fafc;">Anagram Səyahəti</h1>
     <p class="text-lg font-300 mb-10" style="color: #94a3b8;">Gizli sözü tapmaq üçün hərfləri yenidən düzün</p>
     <div class="grid grid-cols-1 md:grid-cols-3 gap-5"><!-- Easy --> <button onclick="startGame('easy')" class="level-card rounded-2xl p-6 text-left border-2 focus:outline-none focus:ring-4 focus:ring-amber-400/50" style="background: #1e293b; border-color: #334155;" aria-label="Asan səviyyə, 4-5 hərflik sözlər, 60 saniyə">
       <div class="flex items-center gap-3 mb-3"><span class="text-3xl">🌱</span> <span id="easyLabelEl" class="text-xl font-700" style="color: #4ade80;">Asan</span>
       </div><p class="text-sm font-400 mb-1" style="color: #94a3b8;">4–5 hərflik sözlər</p><p class="text-xs mono font-500" style="color: #64748b;">⏱ 60 saniyə</p></button> <!-- Medium --> <button onclick="startGame('medium')" class="level-card rounded-2xl p-6 text-left border-2 focus:outline-none focus:ring-4 focus:ring-amber-400/50" style="background: #1e293b; border-color: #334155;" aria-label="Orta səviyyə, 6-7 hərflik sözlər, 60 saniyə">
       <div class="flex items-center gap-3 mb-3"><span class="text-3xl">🔥</span> <span id="mediumLabelEl" class="text-xl font-700" style="color: #fbbf24;">Orta</span>
       </div><p class="text-sm font-400 mb-1" style="color: #94a3b8;">6–7 hərflik sözlər</p><p class="text-xs mono font-500" style="color: #64748b;">⏱ 60 saniyə</p></button> <!-- Hard --> <button onclick="startGame('hard')" class="level-card rounded-2xl p-6 text-left border-2 focus:outline-none focus:ring-4 focus:ring-amber-400/50" style="background: #1e293b; border-color: #334155;" aria-label="Çətin səviyyə, 8+ hərflik sözlər, 110 saniyə">
       <div class="flex items-center gap-3 mb-3"><span class="text-3xl">💎</span> <span id="hardLabelEl" class="text-xl font-700" style="color: #f87171;">Çətin</span>
       </div><p class="text-sm font-400 mb-1" style="color: #94a3b8;">8+ hərflik sözlər</p><p class="text-xs mono font-500" style="color: #64748b;">⏱ 110 saniyə</p></button>
     </div>
    </div>
   </main><!-- SCREEN: Game -->
   <div id="screen-game" class="w-full h-full flex flex-col items-center p-4 md:p-6 hidden" role="main">
    <header class="w-full max-w-xl flex items-center justify-between mb-4 fade-in-up"><button onclick="goToMenu()" class="flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-500 focus:outline-none focus:ring-2 focus:ring-amber-400/50" style="color: #94a3b8; background: #1e293b;" aria-label="Menyuya qayıt"> ← Menyu </button>
     <div class="flex items-center gap-3">
      <div id="scoreDisplay" class="mono text-sm font-600 rounded-xl px-3 py-2" style="color: #fbbf24; background: #1e293b;">
       Xal: 0
      </div>
      <div id="wordCounter" class="mono text-sm font-600 rounded-xl px-3 py-2" style="color: #94a3b8; background: #1e293b;">
       1/10
      </div>
     </div>
    </header>
    <div class="flex-1 flex flex-col items-center justify-center w-full max-w-xl"><!-- Timer -->
     <div id="timerArea" class="mb-6 relative">
      <svg width="90" height="90" class="transform -rotate-90"><circle cx="45" cy="45" r="38" fill="none" stroke="#1e293b" stroke-width="6" /> <circle id="timerRing" cx="45" cy="45" r="38" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round" stroke-dasharray="238.76" stroke-dashoffset="0" class="progress-ring" />
      </svg>
      <div id="timerText" class="absolute inset-0 flex items-center justify-center mono text-xl font-700" style="color: #f8fafc;">
       60
      </div>
     </div><!-- Answer Slots -->
     <div id="answerSlots" class="flex flex-wrap justify-center gap-2 mb-8 min-h-[56px]" aria-label="Sizin cavabınız"></div><!-- Toast Messages -->
     <div id="toastArea" class="h-8 mb-4 flex items-center justify-center"></div><!-- Scrambled Letters -->
     <div id="scrambledLetters" class="flex flex-wrap justify-center gap-2 mb-8" aria-label="Mövcud hərflər"></div><!-- Controls -->
     <div class="flex items-center gap-3 flex-wrap justify-center"><button id="hintBtn" onclick="useHint()" class="flex items-center gap-2 rounded-xl px-5 py-3 text-sm font-600 focus:outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" style="background: #fbbf24; color: #0f172a;" aria-label="İpucu istifadə et"> <span>💡</span> <span id="hintBtnText">İpucu</span> <span id="hintCount" class="mono text-xs font-700 rounded-full w-5 h-5 flex items-center justify-center" style="background: #0f172a; color: #fbbf24;">2</span> </button> <button onclick="clearAnswer()" class="rounded-xl px-5 py-3 text-sm font-600 focus:outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" style="background: #334155; color: #f8fafc;" aria-label="Cavabı təmizlə"> ↺ Təmizlə </button> <button onclick="submitAnswer()" class="rounded-xl px-5 py-3 text-sm font-600 focus:outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" style="background: #4ade80; color: #0f172a;" aria-label="Cavabı təqdim et"> Yoxla ✓ </button>
     </div>
    </div>
   </div><!-- SCREEN: Results -->
   <div id="screen-results" class="w-full h-full flex flex-col items-center justify-center p-6 hidden" role="main">
    <div id="resultsContent" class="text-center max-w-md w-full"></div>
   </div>
  </div>
  <script>
    // ===== WORD LISTS =====
    const WORDS = {
      easy: [
        'play','time','book','fish','tree','bird','moon','fire','cake','rain',
        'star','wave','road','gold','wind','lake','ship','song','bell','king',
        'hand','blue','rock','lion','bear','door','snow','frog','jump','seat',
        'warm','cold','dark','hope','love','dream','plant','stone','beach','light'
      ],
      medium: [
        'garden','planet','bridge','castle','forest','island','market','rocket',
        'silver','travel','winter','summer','basket','candle','dinner','flower',
        'guitar','harbor','jigsaw','kitten','laptop','mirror','nature','orange',
        'purple','rabbit','search','temple','unique','voyage','wander','anchor',
        'bottle','change','bronze','stream','desert','valley','spirit','banner'
      ],
      hard: [
        'elephant','treasure','dinosaur','mountain','umbrella','sandwich',
        'calendar','discover','engineer','firework','gardener','homework',
        'keyboard','language','marvelous','notebook','painting','question',
        'remember','surprise','together','universe','vacation','workshop',
        'absolute','beauties','champion','daughter','enormous','football',
        'grateful','handsome','industry','judgment','kilowatt','lemonade'
      ]
    };

    // ===== GAME STATE =====
    let currentLevel = 'easy';
    let currentWord = '';
    let scrambled = '';
    let answer = [];
    let usedIndices = new Set();
    let hintsLeft = 2;
    let hintsUsed = 0;
    let score = 0;
    let wordIndex = 0;
    let totalWords = 10;
    let timerInterval = null;
    let timeLeft = 60;
    let maxTime = 60;
    let gameWords = [];
    let hintPositions = [];
    let gameActive = false;

    // ===== CONFIG =====
    const defaultConfig = {
      game_title: 'Anagram Səyahəti',
      easy_label: 'Asan',
      medium_label: 'Orta',
      hard_label: 'Çətin',
      hint_button_text: 'İpucu',
      background_color: '#0f172a',
      surface_color: '#1e293b',
      text_color: '#f8fafc',
      primary_action_color: '#4ade80',
      secondary_action_color: '#fbbf24'
    };

    function applyConfig(config) {
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      const fontFamily = config.font_family ? `${config.font_family}, Outfit, sans-serif` : 'Outfit, sans-serif';
      const baseSize = config.font_size || 16;

      document.getElementById('app-wrapper').style.background = bg;
      document.getElementById('app-wrapper').style.fontFamily = fontFamily;

      // Title
      const titleEl = document.getElementById('titleEl');
      if (titleEl) {
        titleEl.textContent = config.game_title || defaultConfig.game_title;
        titleEl.style.color = text;
        titleEl.style.fontSize = `${baseSize * 2.8}px`;
      }

      // Level labels
      const easyLabelEl = document.getElementById('easyLabelEl');
      if (easyLabelEl) {
        easyLabelEl.textContent = config.easy_label || defaultConfig.easy_label;
      }
      const mediumLabelEl = document.getElementById('mediumLabelEl');
      if (mediumLabelEl) {
        mediumLabelEl.textContent = config.medium_label || defaultConfig.medium_label;
      }
      const hardLabelEl = document.getElementById('hardLabelEl');
      if (hardLabelEl) {
        hardLabelEl.textContent = config.hard_label || defaultConfig.hard_label;
      }
      const hintBtnText = document.getElementById('hintBtnText');
      if (hintBtnText) {
        hintBtnText.textContent = config.hint_button_text || defaultConfig.hint_button_text;
      }

      // Surface colors for cards and buttons
      document.querySelectorAll('.level-card').forEach(card => {
        card.style.background = surface;
      });

      // Score and counter
      const scoreD = document.getElementById('scoreDisplay');
      if (scoreD) { scoreD.style.background = surface; scoreD.style.color = secondary; }
      const wordC = document.getElementById('wordCounter');
      if (wordC) { wordC.style.background = surface; wordC.style.color = text; wordC.style.opacity = '0.6'; }

      // Timer text
      const timerT = document.getElementById('timerText');
      if (timerT) timerT.style.color = text;

      // Hint button
      const hintBtn = document.getElementById('hintBtn');
      if (hintBtn) {
        hintBtn.style.background = secondary;
        hintBtn.style.color = bg;
      }
      const hintCountEl = document.getElementById('hintCount');
      if (hintCountEl) {
        hintCountEl.style.background = bg;
        hintCountEl.style.color = secondary;
      }

      // Timer ring
      const timerRing = document.getElementById('timerRing');
      if (timerRing) timerRing.style.stroke = primary;

      // Back button
      const backBtn = document.querySelector('[aria-label="Menyuya qayıt"]');
      if (backBtn) { backBtn.style.background = surface; backBtn.style.color = text; }

      // Submit button
      const submitBtn = document.querySelector('[aria-label="Cavabı təqdim et"]');
      if (submitBtn) { submitBtn.style.background = primary; submitBtn.style.color = bg; }

      // Clear button
      const clearBtn = document.querySelector('[aria-label="Cavabı təmizlə"]');
      if (clearBtn) { clearBtn.style.color = text; }

      // Recolor scrambled tiles and answer slots if game is active
      if (gameActive) {
        renderScrambledLetters();
        renderAnswerSlots();
      }
    }

    // ===== ELEMENT SDK INIT =====
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          applyConfig(config);
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
            },
            {
              get: () => config.surface_color || defaultConfig.surface_color,
              set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
            },
            {
              get: () => config.primary_action_color || defaultConfig.primary_action_color,
              set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); }
            },
            {
              get: () => config.secondary_action_color || defaultConfig.secondary_action_color,
              set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family || 'Outfit',
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size || 16,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title],
          ['easy_label', config.easy_label || defaultConfig.easy_label],
          ['medium_label', config.medium_label || defaultConfig.medium_label],
          ['hard_label', config.hard_label || defaultConfig.hard_label],
          ['hint_button_text', config.hint_button_text || defaultConfig.hint_button_text]
        ])
      });
    }

    // ===== HELPERS =====
    function getConfig() {
      if (window.elementSdk && window.elementSdk.config) return window.elementSdk.config;
      return defaultConfig;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function scrambleWord(word) {
      let letters = word.split('');
      let attempts = 0;
      do {
        letters = shuffle(letters);
        attempts++;
      } while (letters.join('') === word && attempts < 20);
      return letters.join('');
    }

    function showScreen(id) {
      ['screen-select','screen-game','screen-results'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    function showToast(msg, type = 'info') {
      const area = document.getElementById('toastArea');
      const colors = {
        success: { bg: '#065f46', text: '#4ade80' },
        error: { bg: '#7f1d1d', text: '#f87171' },
        info: { bg: '#1e3a5f', text: '#60a5fa' },
        hint: { bg: '#78350f', text: '#fbbf24' }
      };
      const c = colors[type] || colors.info;
      area.innerHTML = `<div class="toast-msg rounded-lg px-4 py-2 text-sm font-500" style="background:${c.bg};color:${c.text};">${msg}</div>`;
      setTimeout(() => { area.innerHTML = ''; }, 2000);
    }

    // ===== GAME LOGIC =====
    function startGame(level) {
      currentLevel = level;
      score = 0;
      wordIndex = 0;
      gameWords = shuffle([...WORDS[level]]).slice(0, totalWords);
      maxTime = (level === 'hard') ? 110 : 60;

      showScreen('screen-game');
      updateScoreDisplay();
      updateWordCounter();
      loadWord();
    }

    function loadWord() {
      gameActive = true;
      currentWord = gameWords[wordIndex];
      scrambled = scrambleWord(currentWord);
      answer = new Array(currentWord.length).fill(null);
      usedIndices = new Set();
      hintsLeft = 2;
      hintsUsed = 0;
      hintPositions = [];
      timeLeft = maxTime;

      document.getElementById('hintCount').textContent = '2';
      document.getElementById('hintBtn').style.opacity = '1';
      document.getElementById('hintBtn').disabled = false;

      renderScrambledLetters();
      renderAnswerSlots();
      updateWordCounter();
      startTimer();
    }

    function renderScrambledLetters() {
      const container = document.getElementById('scrambledLetters');
      const config = getConfig();
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;

      // Rebuild fully for simplicity on load
      container.innerHTML = '';
      scrambled.split('').forEach((letter, i) => {
        const btn = document.createElement('button');
        btn.className = 'letter-tile mono rounded-xl text-xl md:text-2xl font-700 w-12 h-12 md:w-14 md:h-14 flex items-center justify-center border-2 focus:outline-none focus:ring-2 focus:ring-amber-400/50';
        btn.style.background = surface;
        btn.style.color = text;
        btn.style.borderColor = '#475569';
        btn.textContent = letter.toUpperCase();
        btn.dataset.index = i;
        btn.setAttribute('aria-label', `Hərf ${letter.toUpperCase()}`);
        if (usedIndices.has(i)) {
          btn.classList.add('used');
        }
        btn.addEventListener('click', () => selectLetter(i));
        container.appendChild(btn);
      });
    }

    function renderAnswerSlots() {
      const container = document.getElementById('answerSlots');
      const config = getConfig();
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;

      container.innerHTML = '';
      answer.forEach((letter, i) => {
        const slot = document.createElement('button');
        slot.className = 'answer-slot mono rounded-xl text-xl md:text-2xl font-700 w-12 h-12 md:w-14 md:h-14 flex items-center justify-center border-2 focus:outline-none focus:ring-2 focus:ring-amber-400/50';

        const isHintSlot = hintPositions.includes(i);
        if (letter) {
          slot.textContent = letter.toUpperCase();
          slot.style.background = isHintSlot ? secondary : '#334155';
          slot.style.color = isHintSlot ? '#0f172a' : text;
          slot.style.borderColor = isHintSlot ? secondary : '#4ade80';
          slot.classList.add('filled');
          if (isHintSlot) slot.classList.add('hint-revealed');
        } else {
          slot.textContent = '';
          slot.style.background = 'transparent';
          slot.style.color = text;
          slot.style.borderColor = '#334155';
          slot.style.borderStyle = 'dashed';
        }
        slot.dataset.index = i;
        slot.setAttribute('aria-label', letter ? `Mövqe ${i+1}: ${letter.toUpperCase()}` : `Mövqe ${i+1}: boş`);
        if (letter && !isHintSlot) {
          slot.addEventListener('click', () => removeFromAnswer(i));
        }
        container.appendChild(slot);
      });
    }

    function selectLetter(scrIdx) {
      if (!gameActive) return;
      if (usedIndices.has(scrIdx)) return;

      // Find the first empty non-hint slot
      const emptyIdx = answer.findIndex((v, i) => v === null && !hintPositions.includes(i));
      if (emptyIdx === -1) return;

      answer[emptyIdx] = scrambled[scrIdx];
      usedIndices.add(scrIdx);

      renderScrambledLetters();
      renderAnswerSlots();
    }

    function removeFromAnswer(ansIdx) {
      if (!gameActive) return;
      if (hintPositions.includes(ansIdx)) return;
      if (answer[ansIdx] === null) return;

      // Find which scrambled index corresponds
      const letter = answer[ansIdx];
      for (const idx of usedIndices) {
        if (scrambled[idx] === letter) {
          // Check it's not used by a hint
          let isHintUsage = false;
          // We need to be careful: only free the correct scrambled index
          usedIndices.delete(idx);
          break;
        }
      }
      answer[ansIdx] = null;
      renderScrambledLetters();
      renderAnswerSlots();
    }

    function clearAnswer() {
      if (!gameActive) return;
      // Only clear non-hint positions
      for (let i = 0; i < answer.length; i++) {
        if (!hintPositions.includes(i)) {
          answer[i] = null;
        }
      }
      // Recalculate usedIndices based on remaining answer
      usedIndices = new Set();
      const remainingLetters = answer.filter(l => l !== null);
      const scrArr = scrambled.split('');
      const tempUsed = new Set();
      remainingLetters.forEach(letter => {
        for (let j = 0; j < scrArr.length; j++) {
          if (!tempUsed.has(j) && scrArr[j] === letter) {
            tempUsed.add(j);
            break;
          }
        }
      });
      usedIndices = tempUsed;

      renderScrambledLetters();
      renderAnswerSlots();
    }

    function useHint() {
      if (!gameActive || hintsLeft <= 0) return;

      const nextHintPos = hintPositions.length; // 0 then 1
      if (nextHintPos >= currentWord.length) return;

      const correctLetter = currentWord[nextHintPos];

      // If there's already a letter in this slot that's wrong, remove it
      if (answer[nextHintPos] !== null && answer[nextHintPos] !== correctLetter) {
        // Free up the scrambled index
        const oldLetter = answer[nextHintPos];
        const scrArr = scrambled.split('');
        for (const idx of usedIndices) {
          if (scrArr[idx] === oldLetter) {
            usedIndices.delete(idx);
            break;
          }
        }
      }
      // If slot already has correct letter from user, just lock it
      if (answer[nextHintPos] !== correctLetter) {
        // Find this letter in scrambled and mark as used
        const scrArr = scrambled.split('');
        for (let j = 0; j < scrArr.length; j++) {
          if (!usedIndices.has(j) && scrArr[j] === correctLetter) {
            usedIndices.add(j);
            break;
          }
        }
        answer[nextHintPos] = correctLetter;
      }

      hintPositions.push(nextHintPos);
      hintsLeft--;
      hintsUsed++;
      score = Math.max(0, score - 1);

      document.getElementById('hintCount').textContent = String(hintsLeft);
      if (hintsLeft === 0) {
        document.getElementById('hintBtn').style.opacity = '0.4';
        document.getElementById('hintBtn').disabled = true;
      }

      updateScoreDisplay();
      renderScrambledLetters();
      renderAnswerSlots();
      showToast(`İpucu açıldı: mövqe ${nextHintPos + 1}`, 'hint');

    function submitAnswer() {
      if (!gameActive) return;

      const userAnswer = answer.join('');
      if (userAnswer.length < currentWord.length || answer.includes(null)) {
        showToast('Əvvəl bütün hərfləri doldurun!', 'info');
        return;
      }

      if (userAnswer === currentWord) {
        // Correct!
        const timeBonus = Math.floor(timeLeft / 5);
        const basePoints = currentLevel === 'easy' ? 5 : currentLevel === 'medium' ? 10 : 15;
        const earned = basePoints + timeBonus;
        score += earned;
        updateScoreDisplay();
        showToast(`+${earned} xal! 🎉`, 'success');
        spawnConfetti();

        // Animate answer slots
        document.querySelectorAll('.answer-slot').forEach(s => s.classList.add('correct-bounce'));

        clearInterval(timerInterval);
        gameActive = false;

        setTimeout(() => {
          wordIndex++;
          if (wordIndex >= totalWords) {
            showResults();
          } else {
            loadWord();
          }
        }, 1200);
      } else {
        // Wrong
        showToast('Tamamilə doğru deyil — yenə cəhd edin!', 'error');
        const slotsContainer = document.getElementById('answerSlots');
        slotsContainer.classList.add('shake');
        setTimeout(() => slotsContainer.classList.remove('shake'), 400);
      }
    }

    function spawnConfetti() {
      const wrapper = document.getElementById('screen-game');
      const colors = ['#4ade80','#fbbf24','#f87171','#60a5fa','#c084fc','#fb923c'];
      for (let i = 0; i < 24; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.top = `${30 + Math.random() * 20}%`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 0.4}s`;
        piece.style.width = `${6 + Math.random() * 6}px`;
        piece.style.height = `${6 + Math.random() * 6}px`;
        wrapper.appendChild(piece);
        setTimeout(() => piece.remove(), 1600);
      }
    }

    // ===== TIMER =====
    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = maxTime;
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if (timeLeft <= 10) {
          document.getElementById('timerText').classList.add('timer-pulse');
          document.getElementById('timerRing').style.stroke = '#f87171';
        }

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          gameActive = false;
          showToast(`Vaxt bitdi! Söz "${currentWord.toUpperCase()}" idi`, 'error');
          // Reveal the answer
          answer = currentWord.split('');
          renderAnswerSlots();

          setTimeout(() => {
            wordIndex++;
            if (wordIndex >= totalWords) {
              showResults();
            } else {
              loadWord();
            }
          }, 2200);
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const circumference = 2 * Math.PI * 38;
      const offset = circumference * (1 - timeLeft / maxTime);
      document.getElementById('timerRing').style.strokeDashoffset = offset;
      document.getElementById('timerText').textContent = timeLeft;

      if (timeLeft > 10) {
        document.getElementById('timerRing').style.stroke = getConfig().primary_action_color || '#4ade80';
        document.getElementById('timerText').classList.remove('timer-pulse');
      }
    }

    function updateScoreDisplay() {
      document.getElementById('scoreDisplay').textContent = `Xal: ${score}`;
    }

    function updateWordCounter() {
      document.getElementById('wordCounter').textContent = `${wordIndex + 1}/${totalWords}`;
    }

    // ===== KEYBOARD INPUT =====
    document.addEventListener('keydown', (e) => {
      if (!gameActive) return;

      const key = e.key.toLowerCase();

      if (key === 'backspace') {
        e.preventDefault();
        // Remove last filled non-hint letter
        for (let i = answer.length - 1; i >= 0; i--) {
          if (answer[i] !== null && !hintPositions.includes(i)) {
            removeFromAnswer(i);
            break;
          }
        }
        return;
      }

      if (key === 'enter') {
        e.preventDefault();
        submitAnswer();
        return;
      }

      if (/^[a-z]$/.test(key)) {
        // Find matching unused scrambled letter
        const scrArr = scrambled.split('');
        for (let j = 0; j < scrArr.length; j++) {
          if (!usedIndices.has(j) && scrArr[j] === key) {
            selectLetter(j);
            break;
          }
        }
      }
    });

    // ===== RESULTS =====
    function showResults() {
      gameActive = false;
      clearInterval(timerInterval);
      showScreen('screen-results');

      const config = getConfig();
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const bg = config.background_color || defaultConfig.background_color;

      const maxScore = totalWords * ((currentLevel === 'easy' ? 5 : currentLevel === 'medium' ? 10 : 15) + Math.floor(maxTime / 5));
      const pct = Math.round((score / maxScore) * 100);

      let emoji = '🌱';
      let message = 'Təcrübə qazanın!';
      if (pct >= 90) { emoji = '🏆'; message = 'Möhtəşəm!'; }
      else if (pct >= 70) { emoji = '🌟'; message = 'Əla iş!'; }
      else if (pct >= 50) { emoji = '👍'; message = 'Yaxşı iş!'; }
      else if (pct >= 30) { emoji = '💪'; message = 'İrəliləyirsən!'; }

      const levelName = (config[`${currentLevel}_label`] || currentLevel.charAt(0).toUpperCase() + currentLevel.slice(1));

      document.getElementById('resultsContent').innerHTML = `
        <div class="fade-in-up">
          <div class="text-6xl mb-4">${emoji}</div>
          <h2 class="text-3xl font-800 mb-2" style="color:${text};">${message}</h2>
          <p class="text-lg font-300 mb-6" style="color:#94a3b8;">${levelName} Səviyyə Tamamlandı</p>
          <div class="rounded-2xl p-6 mb-8 inline-block" style="background:${surface};">
            <div class="mono text-5xl font-800 mb-1" style="color:${secondary};">${score}</div>
            <div class="text-sm font-400" style="color:#94a3b8;">Ümumi Xal</div>
          </div>
          <div class="flex flex-col gap-3 items-center">
            <button onclick="startGame('${currentLevel}')" class="rounded-xl px-8 py-3 font-600 focus:outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" style="background:${primary};color:${bg};">
              Yenə Oyna
            </button>
            <button onclick="goToMenu()" class="rounded-xl px-8 py-3 font-600 focus:outline-none focus:ring-2 focus:ring-amber-400/50 transition-all" style="background:${surface};color:${text};">
              Səviyyə Seç
            </button>
          </div>
        </div>
      `;
    }

    function goToMenu() {
      gameActive = false;
      clearInterval(timerInterval);
      showScreen('screen-select');
      applyConfig(getConfig());
    }

    // Initial render
    applyConfig(defaultConfig);
  </script>
